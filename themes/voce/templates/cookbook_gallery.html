{% extends "recipes.html" %}

{% block content %}

<style>
    /* Split Layout */
.library-layout {
    display: grid;
    grid-template-columns: 1fr; /* Full width by default */
    gap: 30px;
    align-items: start;
}

/* Layout when Pane is Active */
.library-layout.pane-open {
    grid-template-columns: 1fr 515px; /* Splits the grid */
}

.recipe-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 30px;
  margin-top: 20px;
}

.cookbook-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #eaeaea;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.cookbook-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    border-color: #ccc;
}

.cookbook-cover {
    height: 300px;
    background-size: cover;
    background-position: center;
}

.cookbook-info {
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.cookbook-info h2 {
    font-size: 1.1rem;
    margin: 0 0 5px 0;
}

.view-btn {
    margin-top: 15px;
    padding: 8px;
    background: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    color: #444;
}

/* --- THE SIDE PANE --- */
.cookbook-pane {
    display: none; /* Hidden by default */
    position: sticky;
    top: 20px;
    height: calc(100vh - 40px);
    background: #fff;
    border-radius: 12px;
    /*box-shadow: 0 4px 6px rgba(0,0,0,0.05);*/
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #eee;
    flex-direction: column;
    overflow: hidden;
    margin-top: 20px;
}

.card-details .author {
    font-size: 0.85rem;
}

/* Unhide the pane when active */
.library-layout.pane-open .cookbook-pane {
    display: flex;
}

/* Empty State */
.pane-empty-state {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    color: #999;
}
.empty-icon { font-size: 3rem; margin-bottom: 10px; }

/* Populated State */
.pane-header {
    display: flex;
    gap: 15px;
    padding: 20px;
    padding-right: 40px;
    background: #f8f9fa;
    border-bottom: 1px solid #eaeaea;
}

.pane-mini-cover {
    width: 60px;
    height: 80px;
    background-size: cover;
    background-position: center;
    border-radius: 4px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.pane-header h3 { font-size: 1.2rem; margin: 0 0 5px 0; }
.pane-author { color: #666; font-size: 0.9rem; margin: 10px 0 0 0;}

.pane-content {
    overflow-y: auto; /* Makes the list scrollable inside the pane */
    flex-grow: 1;
}

.pane-content h3 {
    margin: 20px 0 10px 0;
    font-size: 1rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px;
}

.pane-recipe-list {
    list-style: none;
    padding: 0;
}

.pane-recipe-list li {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px 12px 20px;
    border-bottom: 1px solid #f1f3f5;
    font-size: 0.95rem;
}

.pane-recipe-page {
    color: #999;
    font-family: monospace;
    font-weight: bold;
}
/* Ensure the list item spans the full width */
.pane-recipe-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Allow the left side to grow, but give it breathing room */
.pane-recipe-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-grow: 1;           /* Takes up all available space */
    padding-right: 15px;    /* Prevents long titles from touching the page numbers */
}

/* --- NEW: Lock the page numbers into a strict column --- */
.pane-recipe-page {
    color: #999;
    font-family: monospace;
    font-weight: bold;
    min-width: 65px;        /* Forces the column to be a consistent width */
    text-align: right;      /* Aligns the digits down the right side */
    flex-shrink: 0;         /* Prevents the column from being squashed by long titles */
}

.pane-tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

.pane-tag {
    background: #e9ecef;
    color: #495057;
    font-size: 0.75rem;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.close-pane-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 1.8rem;
    line-height: 1;
    color: #999;
    cursor: pointer;
    z-index: 10;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
}

.close-pane-btn:hover {
    color: #333;
    background: #f1f3f5;
}

/* --- MOBILE RESPONSIVENESS --- */
@media (max-width: 900px) {
    .library-layout {
        grid-template-columns: 1fr; /* Stack pane under grid on small screens */
    }

    .library-layout.pane-open {
        grid-template-columns: 1fr;
    }

    .cookbook-pane {
        position: relative;
        top: 0;
        height: auto;
        max-height: 80vh;
        scroll-margin-top: 20px;
    }
}

@media (max-width: 576px) {
    .recipe-gallery {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .cookbook-cover {
        height: 200px;
    }
}

.pane-recipe-name {
    font-weight: 500;
}

.clickable-title {
    cursor: pointer;
    transition: color 0.2s ease;
    display: inline-block; /* Helps prevent layout jumps when adding the checkmark */
}

/* Add a subtle visual cue that it is an interactive element */
.clickable-title:hover {
    color: #007bff; /* Change this to your site's primary theme color */
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 4px;
}

/* Optional: Briefly change color when successfully copied */
.clickable-title.copy-success {
    color: #28a745;
    text-decoration: none;
}

/* Ensure the recipe names still look bold */
.pane-recipe-name {
    font-weight: 600;
}

/* Keep the Deep Linking Highlight Effect */
.highlighted-recipe {
    background-color: #fff3cd;
    transition: background-color 1s ease-out;
}

/* --- TAG TOGGLE UI --- */

/* Align the H3 and the Button on the same line */
.pane-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: #fff;
    margin: 0;
    padding: 20px 20px 10px 10px;
    border-bottom: 1px solid #eaeaea;
}

/* Strip the old margin off the H3 since the wrapper handles it now */
.pane-list-header h3 {
    margin: 0;
}

/* The Toggle Button */
.toggle-tags-btn {
    background: transparent;
    border: 1px solid #ced4da;
    padding: 4px 10px;
    font-size: 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    color: #666;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: bold;
}

.toggle-tags-btn:hover {
    background: #f8f9fa;
    color: #333;
    border-color: #adb5bd;
}

/* THE MAGIC: Instantly collapse all tags when this class is applied to the parent */
.tags-hidden .pane-tags-container {
    display: none;
}

</style>

<div class="recipe-toolbar">
    <div class="view-controls">
        <p style="margin: 0;">{{ page.description }}</p>
    </div>
</div>

<div class="cookbook-library">

    <div class="library-layout" id="library-layout">

        <div class="recipe-gallery">
            {% for book in COOKBOOKS %}
            <div class="recipe-card" onclick="loadPane({{ loop.index0 }})">
                <div class="cookbook-cover" style="background-image: url('{{ book.cover }}');"></div>
                <div class="card-details">
                    <h3>{{ book.book }}</h3>
                    <span class="author">By {{ book.author }}</span>
                </div>
            </div>
            {% endfor %}
        </div>

        <aside class="cookbook-pane" id="index-pane"></aside>

    </div>
</div>

<script>
    function escapeHTML(str) {
            if (!str) return "";
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

    const libraryData = {{ COOKBOOKS | tojson | safe }};

    // Global state to remember your preference across clicks
    let areTagsVisible = false;

    // The function to toggle the UI
    function toggleTags() {
        areTagsVisible = !areTagsVisible;

        const listContainer = document.getElementById('recipe-list-container');
        const btn = document.getElementById('toggle-tags-btn');

        if (areTagsVisible) {
            listContainer.classList.remove('tags-hidden');
            btn.innerText = 'Hide Ingredients';
        } else {
            listContainer.classList.add('tags-hidden');
            btn.innerText = 'Show Ingredients';
        }

        // NEW: Silently update the URL in the browser address bar
        const url = new URL(window.location);
        url.searchParams.set('tags', areTagsVisible ? 'show' : 'hide');
        window.history.replaceState({}, '', url);
    }

    function loadPane(index) {
        const book = libraryData[index];
        const pane = document.getElementById('index-pane');
        const layout = document.getElementById('library-layout');
        const safeBook = escapeHTML(book.book);

        // Sort recipes by page number
        // We spread [...] into a new array so we don't mutate the original data,
        // then sort numerically.
        const sortedRecipes = [...book.recipes].sort((a, b) => {
            const pageA = parseInt(a.page) || 0;
            const pageB = parseInt(b.page) || 0;
            return pageA - pageB;
        });

        let recipesHtml = '';

        sortedRecipes.forEach(recipe => {
            let tagsHtml = '';
            if (recipe.ingredients && recipe.ingredients.length > 0) {
                recipe.ingredients.forEach(ing => {
                    tagsHtml += `<span class="pane-tag">${ing}</span>`;
                });
            }

            // Clean title for data attribute to prevent HTML breakage
            const safeTitle = escapeHTML(recipe.title);

            recipesHtml += `
                <li class="pane-recipe-item" data-recipe-title="${safeTitle}">
                    <div class="pane-recipe-info">
                        <span class="pane-recipe-name clickable-title"
                              data-book="${safeBook}"
                              data-recipe="${safeTitle}"
                              onclick="handleTitleClick(this, event)"
                              title="Click to copy recipe link">
                            ${escapeHTML(recipe.title)}
                        </span>
                        <div class="pane-tags-container">${tagsHtml}</div>
                    </div>
                `

            if ( 'page' in recipe ) {
                recipesHtml += `
                    <span class="pane-recipe-page">${recipe.page}</span>
                `
            }

            recipesHtml += `
                </li>
            `;
        });

        pane.innerHTML = `
            <button class="close-pane-btn" onclick="closePane()" aria-label="Close pane">×</button>
            <div class="pane-header">
                <div class="pane-mini-cover" style="background-image: url('${book.cover}');"></div>
                <div>
                    <h3 class="clickable-title"
                        data-book="${safeBook}"
                        onclick="handleTitleClick(this, event)"
                        title="Click to copy book link">
                        ${escapeHTML(book.book)}
                    </h3>
                    <p class="pane-author">By ${escapeHTML(book.author)}</p>
                </div>
            </div>
            <div class="pane-content">
                <div class="pane-list-header">
                    <h3>Index (${book.recipes.length} recipes)</h3>
                    <button id="toggle-tags-btn" class="toggle-tags-btn" onclick="toggleTags()">
                        ${areTagsVisible ? 'Hide Ingredients' : 'Show Ingredients'}
                    </button>
                </div>

                <ul id="recipe-list-container" class="pane-recipe-list ${areTagsVisible ? '' : 'tags-hidden'}">
                    ${recipesHtml}
                </ul>
            </div>
        `;

        layout.classList.add('pane-open');

        if (window.innerWidth <= 900) {
            pane.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function closePane() {
        document.getElementById('library-layout').classList.remove('pane-open');

        // Clean up the URL so it doesn't stay linked when you close it
        const url = new URL(window.location);
        url.search = '';
        window.history.pushState({}, '', url);
    }

    // This reads the safe data from the HTML and passes it to your copy function
    function handleTitleClick(element, event) {
        const bookTitle = element.dataset.book;

        // If it's the book title, it won't have a dataset.recipe, so we default to null
        const recipeTitle = element.dataset.recipe || null;

        copyLink(bookTitle, recipeTitle, element, event);
    }

    // Helper: Copies the deep link to the clipboard
    function copyLink(bookTitle, recipeTitle, element, event) {
        event.stopPropagation();

        const url = new URL(window.location.origin + window.location.pathname);
        url.searchParams.set('book', bookTitle);
        url.searchParams.set('tags', areTagsVisible ? 'show' : 'hide');

        if (recipeTitle) {
            url.searchParams.set('recipe', recipeTitle);
            const recipeEl = document.querySelector(`.pane-recipe-item[data-recipe-title="${recipeTitle}"]`);

            // 1. Select all elements that have the specific class
            const elements = document.querySelectorAll('.highlighted-recipe');

            // 2. Loop through each and remove the class
            elements.forEach(el => {
              el.classList.remove('highlighted-recipe');
            });

            recipeEl.classList.add('highlighted-recipe');
        }

        window.history.pushState(null, '', url.toString());
    }

    // --- DEEP LINKING LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const urlBook = params.get('book');
        const urlRecipe = params.get('recipe');
        const urlTags = params.get('tags');

        if (urlBook) {
            // Find the index of the book in our JSON data (case-insensitive)
            const bookIndex = libraryData.findIndex(b => b.book.toLowerCase() === urlBook.toLowerCase());

            if (bookIndex !== -1) {
                if (urlTags === 'show') {
                    areTagsVisible = true;
                }

                // 1. Open the pane for this book
                loadPane(bookIndex);

                // 2. Scroll the specific recipe into view
                if (urlRecipe) {
                    // Wait a tiny bit for the HTML to render in the DOM
                    setTimeout(() => {
                        // Find the recipe element using the data attribute we added
                        const safeRecipeQuery = urlRecipe.replace(/"/g, '\\"');
                        const recipeEl = document.querySelector(`.pane-recipe-item[data-recipe-title="${safeRecipeQuery}"]`);

                        if (recipeEl) {
                            recipeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            recipeEl.classList.add('highlighted-recipe');
                        }
                    }, 100);
                }
            }
        }
    });
</script>
{% endblock %}
