{% extends "recipes.html" %}

{% block content %}

<style>
    /* Split Layout */
.library-layout {
    display: grid;
    grid-template-columns: 1fr; /* Full width by default */
    gap: 30px;
    align-items: start;
}

/* Layout when Pane is Active */
.library-layout.pane-open {
    grid-template-columns: 1fr 334px; /* Splits the grid */
}

/* --- THE MASTER GRID --- */
.cookbook-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.cookbook-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #eaeaea;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.cookbook-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    border-color: #ccc;
}

.cookbook-cover {
    height: 300px;
    background-size: cover;
    background-position: center;
}

.cookbook-info {
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.cookbook-info h2 {
    font-size: 1.1rem;
    margin: 0 0 5px 0;
}

.view-btn {
    margin-top: 15px;
    padding: 8px;
    background: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    color: #444;
}

/* --- THE SIDE PANE --- */
.cookbook-pane {
    display: none; /* Hidden by default */
    position: sticky;
    top: 20px;
    height: calc(100vh - 40px);
    background: #fff;
    border-radius: 12px;
    /*box-shadow: 0 4px 6px rgba(0,0,0,0.05);*/
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #eee;
    flex-direction: column;
    overflow: hidden;
    margin-top: 20px;
}
/* Unhide the pane when active */
.library-layout.pane-open .cookbook-pane {
    display: flex;
}

/* Empty State */
.pane-empty-state {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    color: #999;
}
.empty-icon { font-size: 3rem; margin-bottom: 10px; }

/* Populated State */
.pane-header {
    display: flex;
    gap: 15px;
    padding: 20px;
    padding-right: 40px;
    background: #f8f9fa;
    border-bottom: 1px solid #eaeaea;
}

.pane-mini-cover {
    width: 60px;
    height: 80px;
    background-size: cover;
    background-position: center;
    border-radius: 4px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.pane-header h3 { font-size: 1.2rem; margin: 0 0 5px 0; }
.pane-author { color: #666; font-size: 0.9rem; }

.pane-content {
    padding: 0 20px;
    overflow-y: auto; /* Makes the list scrollable inside the pane */
    flex-grow: 1;
}

.pane-content h3 {
    margin: 20px 0 10px 0;
    font-size: 1rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.pane-recipe-list {
    list-style: none;
    padding: 0;
    margin: 0 0 20px 0;
}

.pane-recipe-list li {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #f1f3f5;
    font-size: 0.95rem;
}

.pane-recipe-page {
    color: #999;
    font-family: monospace;
    font-weight: bold;
}
/* Ensure the list item spans the full width */
.pane-recipe-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Allow the left side to grow, but give it breathing room */
.pane-recipe-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-grow: 1;           /* Takes up all available space */
    padding-right: 15px;    /* Prevents long titles from touching the page numbers */
}

/* --- NEW: Lock the page numbers into a strict column --- */
.pane-recipe-page {
    color: #999;
    font-family: monospace;
    font-weight: bold;
    min-width: 65px;        /* Forces the column to be a consistent width */
    text-align: right;      /* Aligns the digits down the right side */
    flex-shrink: 0;         /* Prevents the column from being squashed by long titles */
}

.pane-tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

.pane-tag {
    background: #e9ecef;
    color: #495057;
    font-size: 0.75rem;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.close-pane-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 1.8rem;
    line-height: 1;
    color: #999;
    cursor: pointer;
    z-index: 10;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
}

.close-pane-btn:hover {
    color: #333;
    background: #f1f3f5;
}

/* --- MOBILE RESPONSIVENESS --- */
@media (max-width: 900px) {
    .library-layout {
        grid-template-columns: 1fr; /* Stack pane under grid on small screens */
    }

    .library-layout.pane-open {
        grid-template-columns: 1fr;
    }

    .cookbook-pane {
        position: relative;
        top: 0;
        height: auto;
        max-height: 80vh;
    }
}
</style>

<div class="recipe-toolbar">
    <div class="view-controls">
        <p style="margin: 0;">{{ page.description }}</p>
    </div>
</div>

<div class="cookbook-library">

    <div class="library-layout" id="library-layout">

        <div class="recipe-gallery">
            {% for book in COOKBOOKS %}
            <div class="recipe-card" onclick="loadPane({{ loop.index0 }})">
                <div class="cookbook-cover" style="background-image: url('{{ book.cover }}');"></div>
                <div class="card-details">
                    <h3>{{ book.book }}</h3>
                    <span class="author">By {{ book.author }}</span>
                </div>
            </div>
            {% endfor %}
        </div>

        <aside class="cookbook-pane" id="index-pane"></aside>

    </div>
</div>

<script>
    const libraryData = {{ COOKBOOKS | tojson | safe }};

    function loadPane(index) {
        const book = libraryData[index];
        const pane = document.getElementById('index-pane');
        const layout = document.getElementById('library-layout');

        // --- NEW: Sort recipes by page number ---
        // We spread [...] into a new array so we don't mutate the original data,
        // then sort numerically.
        const sortedRecipes = [...book.recipes].sort((a, b) => {
            const pageA = parseInt(a.page) || 0;
            const pageB = parseInt(b.page) || 0;
            return pageA - pageB;
        });

        let recipesHtml = '';

        // --- UPDATE: Loop over sortedRecipes instead of book.recipes ---
        sortedRecipes.forEach(recipe => {
            let tagsHtml = '';
            if (recipe.ingredients && recipe.ingredients.length > 0) {
                recipe.ingredients.forEach(ing => {
                    tagsHtml += `<span class="pane-tag">${ing}</span>`;
                });
            }

            recipesHtml += `
                <li class="pane-recipe-item">
                    <div class="pane-recipe-info">
                        <span class="pane-recipe-name">${recipe.title}</span>
                    </div>
                    <span class="pane-recipe-page">${recipe.page}</span>
                </li>
            `;
        });

        // ... (The rest of your pane.innerHTML injection remains exactly the same) ...
        pane.innerHTML = `
            <button class="close-pane-btn" onclick="closePane()" aria-label="Close pane">×</button>
            <div class="pane-header">
                <div class="pane-mini-cover" style="background-image: url('${book.cover}');"></div>
                <div>
                    <h3>${book.book}</h3>
                    <span class="pane-author">By ${book.author}</span>
                </div>
            </div>
            <div class="pane-content">
                <h3>Index (${book.recipes.length} recipes)</h3>
                <ul class="pane-recipe-list">
                    ${recipesHtml}
                </ul>
            </div>
        `;

        layout.classList.add('pane-open');

        if (window.innerWidth <= 900) {
            pane.scrollIntoView({ behavior: 'smooth' });
        }
    }

    // New function to hide the pane
    function closePane() {
        document.getElementById('library-layout').classList.remove('pane-open');
    }
</script>
{% endblock %}
